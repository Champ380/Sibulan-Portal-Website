<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Poblacion Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#515f74",
                        "on-primary-container": "#799dd6",
                        "surface-tint": "#3a5f94",
                        "secondary-container": "#d5e3fc",
                        "outline": "#737780",
                        "primary-container": "#003366",
                        "on-secondary-fixed-variant": "#3a485b",
                        "tertiary-fixed-dim": "#ffb690",
                        "outline-variant": "#c3c6d1",
                        "surface-container-low": "#f0f3ff",
                        "tertiary-fixed": "#ffdbca",
                        "tertiary-container": "#592300",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#a7c8ff",
                        "on-secondary-container": "#57657a",
                        "on-primary-fixed-variant": "#1f477b",
                        "primary-fixed": "#d5e3ff",
                        "on-background": "#111c2d",
                        "on-tertiary-fixed": "#341100",
                        "on-surface": "#111c2d",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "on-surface-variant": "#43474f",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#ecf1ff",
                        "on-secondary-fixed": "#0d1c2e",
                        "surface-container-high": "#dee8ff",
                        "on-tertiary-fixed-variant": "#723610",
                        "secondary-fixed": "#d5e3fc",
                        "primary": "#001e40",
                        "inverse-primary": "#a7c8ff",
                        "background": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "on-tertiary-container": "#d8885c",
                        "tertiary": "#381300",
                        "on-primary-fixed": "#001b3c",
                        "error-container": "#ffdad6",
                        "surface-variant": "#d8e3fb",
                        "secondary-fixed-dim": "#b9c7df",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#263143",
                        "surface-container": "#e7eeff",
                        "surface-dim": "#cfdaf2",
                        "surface-container-highest": "#d8e3fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Public Sans"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .editorial-shadow {
            box-shadow: 0 16px 32px -4px rgba(17, 28, 45, 0.06);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Texture/Layering -->
<div class="absolute inset-0 z-0 opacity-40">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[60%] bg-surface-container-low rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[60%] bg-surface-container-high rounded-full blur-[120px]"></div>
</div>
<!-- Institutional Header Context -->
<header class="fixed top-0 w-full z-50 bg-[#f9f9ff]/80 backdrop-blur-md px-6 py-4">
<div class="max-w-7xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl"><img src="https://drive.google.com/thumbnail?id=1cT4ejHJczwMNX4UK9MOJcI53ETI9a02I&sz=w1000
" alt="logo" width="40" height="40"/></span>
<span class="font-headline font-bold text-xl tracking-tighter text-primary">Sibulan Poblacion Portal</span>
</div>
<div class="hidden md:flex gap-6 items-center">

</div>
</div>
</header>
<main class="relative z-10 w-full max-w-md px-6">
<!-- Main Card -->
<div class="bg-surface-container-lowest editorial-shadow p-8 md:p-12 border border-outline-variant/15 rounded-lg">
<div class="mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-lg mb-6">

</div>
<h1 class="font-headline font-bold text-3xl text-primary tracking-tight mb-3">Forgot Password?</h1>
<p class="font-body text-on-surface-variant leading-relaxed">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 focus:bg-surface-container transition-all font-body text-on-surface rounded-t-lg" id="email" name="email" placeholder="name@institution.gov" required="" type="email"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary text-on-primary font-label font-semibold py-4 px-6 rounded-lg hover:bg-primary-container transition-colors active:scale-[0.98] duration-200 flex items-center justify-center gap-2" type="submit">
                        Send Reset Link
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 flex flex-col items-center gap-4">
<a class="inline-flex items-center gap-2 font-label text-sm font-medium text-primary hover:underline transition-all" href="index.html">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
</main>
</body></html>
